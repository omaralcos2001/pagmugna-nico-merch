<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagmugna x Nico — Merch Order</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a20;
      --accent: #e7401f;
      --accent-d: #c5340f;
      --text: #f2f2f0;
      --muted: #9a9aa2;
      --border: #2c2c35;
      --ok: #2ecc71;
      --err: #ff5b5b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #20202a 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 80px;
    }
    .wrap { width: 100%; max-width: 560px; }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-size: 28px;
      letter-spacing: 0.5px;
      margin: 0 0 6px;
    }
    .brand .tag { color: var(--muted); font-size: 14px; margin: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px;
      color: var(--text);
    }
    .req { color: var(--accent); }
    .field { margin-bottom: 18px; }
    input, select, textarea {
      width: 100%;
      background: #121217;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 70px; }
    .row { display: flex; gap: 14px; }
    .row .field { flex: 1; }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }
    button:hover { background: var(--accent-d); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.ok { background: rgba(46,204,113,0.12); color: var(--ok); border: 1px solid rgba(46,204,113,0.4); }
    .msg.err { background: rgba(255,91,91,0.12); color: var(--err); border: 1px solid rgba(255,91,91,0.4); }
    .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>PAGMUGNA × NICO</h1>
      <p class="tag">Official merch order form</p>
    </div>
    <div class="card">
      <form id="orderForm">
        <div class="field">
          <label for="name">Full name <span class="req">*</span></label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="row">
          <div class="field">
            <label for="email">Email <span class="req">*</span></label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" />
          </div>
        </div>
        <div class="field">
          <label for="item">Item <span class="req">*</span></label>
          <select id="item" name="item" required>
            <option value="" disabled selected>Select an item</option>
            <option>Classic Tee</option>
            <option>Premium Hoodie</option>
            <option>Snapback Cap</option>
            <option>Tote Bag</option>
            <option>Sticker Pack</option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label for="size">Size <span class="req">*</span></label>
            <select id="size" name="size" required>
              <option value="" disabled selected>Size</option>
              <option>XS</option><option>S</option><option>M</option>
              <option>L</option><option>XL</option><option>XXL</option>
              <option>One size</option>
            </select>
          </div>
          <div class="field">
            <label for="quantity">Quantity <span class="req">*</span></label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required />
          </div>
        </div>
        <div class="field">
          <label for="address">Shipping address / pickup <span class="req">*</span></label>
          <textarea id="address" name="address" required></textarea>
        </div>
        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Anything else we should know?"></textarea>
        </div>
        <button type="submit" id="submitBtn">Place order</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <p class="foot">Your details are sent securely and recorded for order fulfillment only.</p>
  </div>

  <script>
    const form = document.getElementById('orderForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    function showMsg(text, ok) {
      msg.textContent = text;
      msg.className = 'msg show ' + (ok ? 'ok' : 'err');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      msg.className = 'msg';

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const out = await res.json().catch(() => ({}));
        if (res.ok) {
          showMsg('Order received! We’ll be in touch by email. 🎉', true);
          form.reset();
        } else {
          showMsg(out.error || 'Something went wrong. Please try again.', false);
        }
      } catch (err) {
        showMsg('Network error. Please try again.', false);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Place order';
      }
    });
  </script>
</body>
</html>
